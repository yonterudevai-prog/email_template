<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Role Atlas</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, sans-serif; font-size: 14px; color: #222; background: #fff; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 200px; padding: 16px; border-right: 1px solid #ddd; background: #fafafa; flex-shrink: 0; }
  .sidebar h1 { font-size: 16px; margin: 0 0 12px; }
  .sidebar a { display: block; padding: 6px 0; color: #333; text-decoration: none; }
  .sidebar a:hover { text-decoration: underline; }
  .main { flex: 1; padding: 16px 20px; overflow-x: auto; }
  .main > p { color: #666; margin: 0 0 20px; }
  section { margin-bottom: 32px; }
  section h2 { font-size: 18px; margin: 0 0 4px; }
  section .count { color: #888; font-size: 12px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
  th { font-size: 12px; color: #666; font-weight: normal; background: #f5f5f5; }
  td.num { width: 40px; color: #888; }
  td.copy { width: 50px; text-align: right; }
  .copy-btn { background: none; border: none; color: #0066cc; cursor: pointer; font-size: 12px; padding: 0; text-decoration: underline; }
  .copy-btn:hover { color: #004499; }
  @media (max-width: 700px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #ddd; }
    .sidebar a { display: inline-block; margin-right: 16px; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>Role Atlas</h1>
    <a href="#software">Software (14)</a>
    <a href="#ai">AI / ML (22)</a>
    <a href="#sap">SAP (19)</a>
    <a href="#universal">Universal (42)</a>
  </aside>
  <main>
    <p>97 roles · click <em>copy</em> to copy any title</p>
    <div id="sections"></div>
  </main>
</div>

<script>

      'ASP.NET Core Developer',
      'Software Engineer',
      'Backend Engineer',
      'Full Stack Engineer',
      'Full Stack Developer (React / Angular + Backend)',
      'Frontend Engineer',
      'UI Engineer',
      'Java Developer',
      'Backend Java Engineer',
      'Spring Boot Developer',
      'React Developer',
      'Angular Developer'
    ]
  },
  {
    id: 'ai',
    title: 'AI / Machine Learning',
    roles: [
      'Agentic AI Engineer',
      'AI Engineer',
      'AI Developer',
      'Generative AI Engineer',
      'LLM Engineer',
      'Applied AI Engineer',
      'AI Systems Engineer',
      'Machine Learning Engineer',
      'Software Engineer (AI/ML)',
      'Applied Data Scientist',
      'Data Scientist',
      'Research Scientist (AI/ML)',
      'NLP Engineer',
      'Computer Vision Engineer',
      'Deep Learning Engineer',
      'AI Solutions Architect',
      'AI Infrastructure Engineer',
      'MLOps Engineer',
      'ML Platform Engineer',
      'Data Engineer',
      'Analytics Engineer',
      'Business Intelligence Engineer'
    ]
  },
  {
    id: 'sap',
    title: 'SAP',
    roles: [
      'SAP FICO Consultant',
      'SAP ABAP Developer',
      'SAP SuccessFactors Consultant',
      'SAP S/4HANA Consultant',
      'SAP MM Consultant',
      'SAP SD Consultant',
      'SAP Basis Administrator',
      'SAP Security Consultant',
      'SAP GRC Consultant',
      'SAP HANA Developer / Consultant',
      'SAP BW/BI Consultant',
      'SAP Integration Consultant (PI/PO, CPI)',
      'SAP Ariba Consultant',
      'SAP PP Consultant',
      'SAP PM Consultant',
      'SAP Payroll Consultant',
      'SAP TM (Transportation Management) Consultant',
      'SAP QM (Quality Management) Consultant',
      'SAP Analytics Cloud (SAC) Consultant'
    ]
  },
  {
    id: 'universal',
    title: 'Universal / Platform',
    roles: [
      'IT Support Specialist',
      'Service Desk Administrator',
      'Help Desk Administrator',
      'System Administrator',
      'Application Support Engineer',
      'Production Support Engineer',
      'Incident Management Specialist',
      'Microsoft 365 Administrator',
      'Active Directory Administrator',
      'Cloud Administrator',
      'Security Administrator',
      'IAM Administrator',
      'Salesforce Administrator',
      'Salesforce Developer',
      'Salesforce Platform Developer',
      'ServiceNow Administrator',

      'Business Process Administrator',
      'Integration Administrator',
      'RPA Developer',
      'RPA Administrator',

      'Salesforce Consultant',
      'Salesforce Business Analyst',
      'Salesforce CPQ Consultant',
      'Salesforce Service Cloud Consultant',
      'Salesforce Sales Cloud Consultant',
      'Salesforce Marketing Cloud Specialist',
      'Salesforce Field Service Consultant',
      'Salesforce Industries Consultant (Vlocity / OmniStudio)',
      'Google Workspace Administrator',
      'BI Administrator',
      'Data Operations Specialist',
      'Automation Specialist',
      'Low-Code Developer',
      'No-Code Developer',
      'Salesforce Architect',
      'Solution Architect',
      'GRC Administrator',
      'Salesforce Security Administrator',
      'Salesforce Release Manager',
      'Salesforce Data Cloud Consultant'
    ]
  }
];

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise(function(resolve, reject) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy') ? resolve() : reject(); }
    catch (e) { reject(e); }
    document.body.removeChild(ta);
  });
}

function render() {
  var root = document.getElementById('sections');
  var html = '';

  CATEGORIES.forEach(function(cat) {
    html += '<section id="' + cat.id + '">';
    html += '<h2>' + cat.title + '</h2>';
    html += '<div class="count">' + cat.roles.length + ' roles</div>';
    html += '<table><thead><tr><th>#</th><th>Role</th><th></th></tr></thead><tbody>';

    cat.roles.forEach(function(role, i) {
      var num = String(i + 1).padStart(2, '0');
      html += '<tr>';
      html += '<td class="num">' + num + '</td>';
      html += '<td class="role-name">' + role + '</td>';
      html += '<td class="copy"><button type="button" class="copy-btn" data-role="' + role.replace(/"/g, '&quot;') + '">copy</button></td>';
      html += '</tr>';
    });

    html += '</tbody></table></section>';
  });

  root.innerHTML = html;

  root.querySelectorAll('.copy-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var role = btn.getAttribute('data-role');
      var label = 'copy';
      copyText(role).then(function() {
        btn.textContent = 'copied';
        setTimeout(function() { btn.textContent = label; }, 1200);
      }).catch(function() {
        btn.textContent = 'fail';
        setTimeout(function() { btn.textContent = label; }, 1200);
      });
    });
  });
}

render();
</script>
</body>
</html>
